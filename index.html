<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Sting - Presentation Loop</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: #0b0b0b;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            overflow: hidden; /* Ховаємо скрол взагалі, бо сайт тепер працює сам */
            height: 100vh;
            width: 100%;
        }

        /* Шапка */
        nav.main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-logo {
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
        }

        /* Повноекранна сцена для презентації */
        .scene-view {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0b0b;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .loading {
            position: absolute;
            color: #ffad36;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
            font-weight: bold;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <a href="#" class="nav-logo">STING PRESENTATION</a>
    </nav>

    <div class="scene-view">
        <div class="loading" id="loader">Завантаження кадрів (0/90)...</div>
        <canvas id="sequence-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("sequence-canvas");
        const context = canvas.getContext("2d");
        const loader = document.getElementById("loader");

        // --- НАЛАШТУВАННЯ СИКВЕНЦІЇ ---
        const startFrame = 0;
        const endFrame = 89;
        const frameCount = (endFrame - startFrame) + 1; // Усього 90 кадрів (від 0000 до 0089)
        const fps = 24; // Швидкість відтворення (кадрів на секунду)
        
        // Переконайся, що назва та папка збігаються. Якщо вони лежать у папці img, додай її на початок: `img/3D_2_...`
        const currentFrame = index => `3D_2_${index.toString().padStart(4, '0')}.png`;

        const images = [];
        let currentFrameIndex = 0;
        let loopCount = 0; // Лічильник прокручених кіл
        let loadedCount = 0;

        // Попереднє завантаження 90 кадрів у пам'ять
        for (let i = startFrame; i <= endFrame; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                if (loader) {
                    loader.innerText = `Завантаження кадрів (${loadedCount}/${frameCount})...`;
                }
                if (loadedCount === frameCount) {
                    startPlayback();
                }
            };
            images.push(img);
        }

        function startPlayback() {
            if (loader) {
                loader.style.opacity = 0;
                setTimeout(() => loader.style.display = "none", 500);
            }
            
            canvas.width = images[0].naturalWidth || 1920;
            canvas.height = images[0].naturalHeight || 1080;

            function drawFrame() {
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.drawImage(images[currentFrameIndex], 0, 0);
            }

            drawFrame();

            // Запускаємо інтервал відтворення на основі виставленого FPS
            const intervalTime = 1000 / fps;
            const playInterval = setInterval(() => {
                currentFrameIndex++;

                // Якщо дійшли до кінця (89 кадру)
                if (currentFrameIndex >= frameCount) {
                    loopCount++; // Фіксуємо, що коло завершилось

                    if (loopCount < 2) {
                        // Якщо це було перше коло — скидаємо на 0 і крутимо ще раз
                        currentFrameIndex = 0;
                    } else {
                        // Якщо відкрутило друге коло — зупиняємо таймер на останньому кадрі
                        clearInterval(playInterval);
                        currentFrameIndex = frameCount - 1; // Залишаємо фінальний кадр
                        console.log("Відтворення завершено. Анімація програлася 2 рази.");
                    }
                }

                drawFrame();
            }, intervalTime);
        }
    </script>
</body>
</html>
