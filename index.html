<div class="next-section">
        <div class="content-section">
            <h4>STING SYSTEM PREVIEW</h4>
            <p>Презентація інноваційного комплексу Sting. Деталізований рендер оптичного модуля та захисного кейсу демонструє безкомпромісну надійність у будь-яких умовах. Прокручуйте сторінку, щоб дослідити кожен елемент інженерного рішення у динаміці.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // Перевіряємо, чи бібліотеки точно завантажились, перед реєстрацією
        if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
            gsap.registerPlugin(ScrollTrigger);
            setupAnimation();
        } else {
            console.error("Помилка: GSAP не завантажився з мережі CDN!");
        }

        function setupAnimation() {
            const canvas = document.getElementById("sequence-canvas");
            const context = canvas.getContext("2d");
            const loader = document.getElementById("loader");

            const frameCount = 90; 
            const currentFrame = index => `img/3D_2_${index.toString().padStart(4, '0')}.png`;

            const images = [];
            const sequenceState = { frame: 0 };

            let loadedCount = 0;
            for (let i = 0; i < frameCount; i++) {
                const img = new Image();
                img.src = currentFrame(i);
                img.onload = () => {
                    loadedCount++;
                    if (loader) {
                        loader.innerText = `Завантаження кадрів (${loadedCount}/${frameCount})...`;
                    }
                    if (loadedCount === frameCount) {
                        buildAnimation();
                    }
                };
                // Якщо картинка не знайшлася, виведемо в консоль
                img.onerror = () => console.error("Не вдалося завантажити кадр:", img.src);
                images.push(img);
            }

            function buildAnimation() {
                if (loader) {
                    loader.style.opacity = 0;
                    setTimeout(() => loader.style.display = "none", 500);
                }
                
                canvas.width = images[0].naturalWidth || 1080;
                canvas.height = images[0].naturalHeight || 1920;

                function drawFrame() {
                    context.clearRect(0, 0, canvas.width, canvas.height);
                    context.drawImage(images[sequenceState.frame], 0, 0);
                }

                drawFrame();

                const mainTimeline = gsap.timeline({
                    scrollTrigger: {
                        trigger: ".scroll-container",
                        start: "top top",
                        end: "bottom bottom",
                        scrub: 0.15
                    }
                });

                mainTimeline.to(sequenceState, {
                    frame: frameCount - 1,
                    snap: "frame",
                    ease: "none",
                    duration: 1,
                    onUpdate: drawFrame
                });

                mainTimeline.to(sequenceState, {
                    frame: 0,
                    snap: "frame",
                    ease: "none",
                    duration: 0,
                    onUpdate: drawFrame
                });

                mainTimeline.to(sequenceState, {
                    frame: frameCount - 1,
                    snap: "frame",
                    ease: "none",
                    duration: 1,
                    onUpdate: drawFrame
                });
            }

            ScrollTrigger.create({
                trigger: ".scroll-container",
                start: "bottom bottom",
                end: "bottom top",
                scrub: true,
                onUpdate: (self) => {
                    gsap.set(".sticky-scene", { translateY: -self.progress * 100 + "%" });
                }
            });
        }
    </script>
</body>
</html>
